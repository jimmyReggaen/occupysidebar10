<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720">
<title>Biometrics House — OCCUPY Room Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Montserrat',sans-serif;
  background:#111;
  display:flex;justify-content:center;align-items:flex-start;
  min-height:100vh;padding:20px 0;
}
.panel{
  width:720px;background:#000;
  display:flex;flex-direction:column;gap:18px;overflow:hidden;
}
.section{position:relative;width:720px;flex-shrink:0;}
.section img{display:block;width:720px;height:auto;}

/* ── Drag & Drop ── */
.section.draggable{cursor:grab;user-select:none;}
.section.draggable:active{cursor:grabbing;}
.section.dragging{opacity:0.4;}
.section.drag-over{border-top:3px solid #4590FF;}
.drag-handle{
  position:absolute;top:4px;right:4px;z-index:10;
  width:28px;height:28px;border-radius:6px;
  background:rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;
  cursor:grab;opacity:0;transition:opacity 0.2s;
}
.section:hover .drag-handle{opacity:1;}
.drag-handle::before{
  content:'⋮⋮';font-size:14px;color:rgba(255,255,255,0.4);letter-spacing:2px;
}

/* ── Hotspot ── */
.hotspot{
  position:absolute;cursor:pointer;z-index:5;border-radius:16px;
  transition:background 0.15s;
}
.hotspot:hover{background:rgba(255,255,255,0.04)}
.hotspot:active{background:rgba(255,255,255,0.08)}

/* ── Tile flash ── */
.tile-flash{
  position:absolute;z-index:5;cursor:pointer;border-radius:16px;
  background:transparent;transition:background 0.15s,box-shadow 0.15s;
}
.tile-flash.flash{
  background:linear-gradient(160deg,rgba(27,0,226,0.65) 0%,rgba(14,0,113,0.65) 100%);
  box-shadow:0 0 20px rgba(27,0,226,0.3);
}

/* ── Recording section (pure HTML/CSS) ── */
.rec-section{position:relative;width:720px}
.rec-slash{
  display:flex;align-items:center;justify-content:center;
  height:20px;position:relative;
}
.rec-slash .line{position:absolute;width:100%;height:1px;background:#4590ff}
.rec-slash .label-wrap{
  position:relative;z-index:1;display:flex;align-items:center;gap:4px;
  padding:0 12px;background:#000;
}
.rec-slash .dot{width:8px;height:8px;background:#4590ff;border-radius:50%}
.rec-slash span.txt{font-size:12px;font-weight:600;color:rgba(255,255,255,0.6);letter-spacing:1px}
.rec-card{
  margin:14px 24px 0;border-radius:20px;background:#0d0f1a;
  border:1px solid rgba(255,255,255,0.07);
  padding:0 26px;height:80px;
  display:flex;align-items:center;gap:20px;
  position:relative;overflow:hidden;
}
.rec-card::before{
  content:'';position:absolute;inset:1px;border-radius:19px;
  background:linear-gradient(212deg,rgba(255,255,255,0.12) 0%,transparent 55%);
  pointer-events:none;
}
.rec-btn{
  width:34px;height:34px;border-radius:17px;cursor:pointer;
  background:rgba(100,116,139,0.19);position:relative;
  border:1.5px solid;
  border-image:linear-gradient(135deg,rgba(100,116,139,0.53),rgba(100,116,139,0.27),rgba(100,116,139,0.53)) 1;
  border-image:none;
  border-color:rgba(100,116,139,0.45);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(100,116,139,0.37),0 0 24px rgba(100,116,139,0.31),0 4px 12px rgba(0,0,0,0.13);
  transition:background 0.3s,box-shadow 0.3s,border-color 0.3s;
  flex-shrink:0;
}
.rec-btn .rec-dot-inner{
  width:14px;height:14px;border-radius:50%;
  background:#64748B;transition:background 0.3s;
  box-shadow:0 0 8px rgba(100,116,139,0.66);
}
.rec-btn.active{
  background:rgba(220,38,38,0.25);
  border-color:rgba(220,38,38,0.5);
  box-shadow:0 2px 10px rgba(220,38,38,0.4),0 0 24px rgba(220,38,38,0.3),0 4px 12px rgba(0,0,0,0.13);
}
.rec-btn.active .rec-dot-inner{
  background:#DC2626;
  box-shadow:0 0 8px rgba(220,38,38,0.7);
  animation:pulse-rec 1.5s ease-in-out infinite;
}
@keyframes pulse-rec{
  0%,100%{box-shadow:0 0 6px rgba(220,38,38,0.5)}
  50%{box-shadow:0 0 14px 4px rgba(220,38,38,0.4)}
}
.rec-label{
  font-family:'Montserrat',sans-serif;font-size:16px;font-weight:600;
  color:rgba(255,255,255,0.87);letter-spacing:1.5px;
  flex-shrink:0;
}
.rec-time{
  font-family:'Montserrat',sans-serif;font-size:16px;font-weight:600;
  color:#64748B;letter-spacing:0.52px;
  transition:color 0.3s;flex-shrink:0;
}
.rec-time.active{color:#DC2626}
.rec-waveform{
  flex:1;height:28px;display:flex;align-items:center;gap:2.5px;
  overflow:hidden;
}
.rec-waveform span{
  width:3px;border-radius:2px;background:#64748B66;
  transition:background 0.3s;flex-shrink:0;
}
.rec-waveform.active span{
  background:#DC2626AA;
  animation:wave-active 0.8s ease-in-out infinite;
}
@keyframes wave-active{
  0%,100%{transform:scaleY(0.3);opacity:0.6}
  50%{transform:scaleY(1);opacity:1}
}
.rec-controls{display:flex;gap:8px;flex-shrink:0}
.rec-ctrl{
  width:34px;height:34px;border-radius:17px;cursor:pointer;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(12px);
  box-shadow:0 2px 8px rgba(255,255,255,0.15);
}
.rec-ctrl svg{width:11px;height:13px;fill:rgba(255,255,255,0.7)}

/* ── OCCUPIED Card (HTML) ── */
.occ-card{
  width:720px;height:473px;border-radius:26px;overflow:hidden;
  background:#e82428;position:relative;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:14px 0 18px;
  background-image:
    radial-gradient(ellipse at 25% 15%,rgba(255,85,85,0.5) 0%,transparent 55%),
    radial-gradient(ellipse at 75% 60%,rgba(221,68,85,0.35) 0%,transparent 55%),
    radial-gradient(ellipse at 55% 5%,rgba(255,102,102,0.35) 0%,transparent 45%),
    radial-gradient(ellipse at 15% 65%,rgba(221,51,85,0.35) 0%,transparent 50%);
}
.occ-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 30px;height:60px;
}
.occ-title{font-size:44px;font-weight:700;color:#fff;line-height:1;}
.occ-fornext{display:flex;align-items:baseline;gap:12px;}
.occ-fornext-label{font-size:21px;font-weight:700;color:#fff;}
.occ-fornext-time{font-size:38px;font-weight:700;color:#fff;}
.occ-slash{
  display:flex;align-items:center;justify-content:center;
  height:20px;position:relative;padding:0;margin:8px 0 0;
}
.occ-slash::before{
  content:'';position:absolute;width:100%;height:1px;background:#fff;
}
.occ-slash span{
  position:relative;z-index:1;background:#e82428;padding:0 10px;
  font-size:10px;font-weight:700;color:#fff;letter-spacing:2px;
}
.occ-meeting-row{
  display:flex;justify-content:space-between;align-items:center;gap:12px;
  padding:6px 30px;
}
.occ-meeting-info{
  font-size:16px;font-weight:700;color:#fff;line-height:1.25;max-width:280px;
}
.occ-meeting-time{
  font-size:38px;font-weight:700;color:#fff;letter-spacing:-1px;line-height:1;
}
/* Timer Bar */
.occ-timer-track{
  position:relative;height:17px;margin:4px 30px;
  background:rgba(98,0,0,0.52);border-radius:9px;
}
.occ-timer-fill{
  position:absolute;left:0;top:0;height:17px;border-radius:9px;
  background:linear-gradient(to right,#FFD700,#FF8C00 40%,#b73202 70%,rgba(204,17,0,0.5));
  transition:width 1s linear;
}
.occ-timer-dot{
  position:absolute;top:-3px;width:23px;height:23px;border-radius:50%;
  background:#FFD700;
  box-shadow:0 0 8px rgba(255,215,0,0.53),0 0 4px rgba(255,215,0,0.67);
  transition:left 1s linear;
}
/* Extend Buttons */
.occ-extend-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 30px;
}
.occ-extend-label{
  font-size:16px;font-weight:700;color:#fff;letter-spacing:-0.5px;
}
.occ-extend-buttons{display:flex;gap:6px;}
.occ-ext-btn{
  width:137px;height:47px;border-radius:65px;cursor:pointer;
  background:rgba(255,255,255,0.33);
  border:1.5px solid rgba(255,255,255,0.35);
  backdrop-filter:blur(24px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 0.3s,background 0.3s;
  box-shadow:0 0 8px rgba(0,0,0,0.09),0 0 4px rgba(255,255,255,0.27);
}
.occ-ext-btn .num{font-size:28px;font-weight:700;color:#fff;line-height:1;letter-spacing:-0.3px;}
.occ-ext-btn .unit{font-size:10px;font-weight:700;color:#fff;line-height:1;letter-spacing:0.8px;}
.occ-ext-btn.disabled{
  opacity:0.3;cursor:not-allowed;pointer-events:none;
  background:rgba(255,255,255,0.08);
}
.occ-ext-btn:not(.disabled):hover{background:rgba(255,255,255,0.45);}
.occ-ext-btn:not(.disabled):active{background:rgba(255,255,255,0.55);}

/* ── FREE Card (HTML) ── */
.free-card{
  width:720px;height:473px;border-radius:26px;overflow:hidden;
  background:#1b00e2;position:relative;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:14px 0 18px;
  background-image:
    radial-gradient(ellipse at 25% 15%,rgba(85,85,255,0.5) 0%,transparent 55%),
    radial-gradient(ellipse at 75% 60%,rgba(68,85,221,0.35) 0%,transparent 55%),
    radial-gradient(ellipse at 55% 5%,rgba(102,102,255,0.35) 0%,transparent 45%),
    radial-gradient(ellipse at 15% 65%,rgba(51,85,221,0.35) 0%,transparent 50%);
}
.free-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 30px;height:60px;
}
.free-title{font-size:44px;font-weight:700;color:#fff;line-height:1;}
.free-fornext{display:flex;align-items:baseline;gap:12px;}
.free-fornext-label{font-size:21px;font-weight:700;color:#fff;}
.free-fornext-time{font-size:38px;font-weight:700;color:#fff;}
.free-line{height:1px;background:rgba(255,255,255,0.25);margin:8px 30px 0;}
.free-book-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 30px;
}
.free-book-label{font-size:16px;font-weight:700;color:#fff;}
.free-book-buttons{display:flex;gap:6px;}
.free-btn{
  width:137px;height:47px;border-radius:65px;cursor:pointer;
  background:rgba(255,255,255,0.33);
  border:1.5px solid rgba(255,255,255,0.35);
  backdrop-filter:blur(24px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 0.3s,background 0.3s;
  box-shadow:0 0 8px rgba(0,0,0,0.09),0 0 4px rgba(255,255,255,0.27);
}
.free-btn .num{font-size:28px;font-weight:700;color:#fff;line-height:1;letter-spacing:-0.3px;}
.free-btn .unit{font-size:10px;font-weight:700;color:#fff;line-height:1;letter-spacing:0.8px;}
.free-btn.disabled{
  opacity:0.3;cursor:not-allowed;pointer-events:none;
  background:rgba(255,255,255,0.08);
}
.free-btn:not(.disabled):hover{background:rgba(255,255,255,0.45);}
.free-btn:not(.disabled):active{background:rgba(255,255,255,0.55);}
/* Free card meeting rows */
.free-slash{
  display:flex;align-items:center;justify-content:center;
  height:20px;position:relative;margin:8px 0 0;
}
.free-slash::before{
  content:'';position:absolute;width:100%;height:1px;background:#fff;
}
.free-slash span{
  position:relative;z-index:1;background:#1b00e2;padding:0 10px;
  font-size:10px;font-weight:700;color:#fff;letter-spacing:2px;
}
.free-meeting-row{
  display:flex;justify-content:space-between;align-items:center;gap:12px;
  padding:6px 30px;
}
.free-meeting-info{
  font-size:16px;font-weight:700;color:#fff;line-height:1.25;max-width:280px;
}
.free-meeting-time{
  font-size:38px;font-weight:700;color:#fff;letter-spacing:-1px;line-height:1;
}
/* Info button (shared) */
.info-btn{
  width:28px;height:28px;border-radius:14px;flex-shrink:0;
  background:rgba(255,255,255,0.27);
  backdrop-filter:blur(20px);
  border:1.5px solid rgba(255,255,255,0.4);
  display:flex;align-items:center;justify-content:center;
  font-family:'Montserrat',sans-serif;font-size:16px;font-style:italic;
  font-weight:600;color:rgba(255,255,255,0.93);
  box-shadow:0 2px 6px rgba(0,0,0,0.12),0 1px 3px rgba(255,255,255,0.2);
  cursor:pointer;
}

/* ── Card state switching ── */
.card-state{display:none;position:relative;}
.card-state.active{display:block;}
.card-state img{display:block;width:720px;height:auto;}
.card-state .hotspot{
  position:absolute;cursor:pointer;z-index:5;border-radius:65px;
  transition:background 0.15s;
}
.card-state .hotspot:hover{background:rgba(255,255,255,0.08)}
.card-state .hotspot:active{background:rgba(255,255,255,0.15)}

/* ── Live clock overlay (status bar pill) ── */
.live-clock{
  position:absolute;z-index:6;
  font-family:'Montserrat',sans-serif;
  font-size:20px;font-weight:600;color:#FFFFFFCC;
  line-height:24px;
}

/* ── Countdown overlay (occupied card) ── */
.live-countdown{
  position:absolute;z-index:6;
  font-family:'Montserrat',sans-serif;
  font-size:32px;font-weight:700;color:#fff;
  text-align:right;line-height:1;
}

/* ── Toast ── */
.toast{
  position:fixed;bottom:40px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#1B00E2;color:#fff;padding:12px 24px;border-radius:12px;
  font-size:14px;font-weight:600;letter-spacing:0.5px;
  opacity:0;transition:all 0.3s;z-index:100;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Footer ── */
.panel-footer{padding:16px 24px;text-align:center;}
.panel-footer img{height:20px;opacity:0.4;}
</style>
</head>
<body>
<div class="panel" id="panel">

  <!-- ═══ STATUS BAR ═══ -->
  <div class="section draggable" draggable="true" data-name="statusbar">
    <div class="drag-handle"></div>
    <img src="occupy-assets/r9Fnl.png" alt="">
    <!-- Live clock over the transparent text in the glass pill -->
    <div class="live-clock" id="liveClock" style="left:74px;top:23px;line-height:42px;">00:00</div>
  </div>

  <!-- ═══ ROOM NAME ═══ -->
  <div class="section draggable" draggable="true" data-name="roomname">
    <div class="drag-handle"></div>
    <img src="occupy-assets/xEPzK.png" alt="">
  </div>

  <!-- ═══ BOOKING CARD (FREE ↔ OCCUPIED) ═══ -->
  <div class="section" data-name="booking-card">
    <div class="drag-handle"></div>
    <!-- FREE STATE (HTML/CSS) -->
    <div id="freeCard" class="card-state active">
      <div class="free-card">
        <!-- Header -->
        <div class="free-header">
          <span class="free-title">FREE</span>
          <div class="free-fornext">
            <span class="free-fornext-label">FOR THE NEXT</span>
            <span class="free-fornext-time" id="freeCountdown">90min.</span>
          </div>
        </div>
        <!-- Separator -->
        <div class="free-line"></div>
        <!-- Book Now -->
        <div class="free-book-row">
          <span class="free-book-label">BOOK NOW:</span>
          <div class="free-book-buttons">
            <div class="free-btn" id="freeBtn15" data-min="15"><span class="num">15</span><span class="unit">min</span></div>
            <div class="free-btn" id="freeBtn30" data-min="30"><span class="num">30</span><span class="unit">min</span></div>
            <div class="free-btn" id="freeBtn60" data-min="60"><span class="num">60</span><span class="unit">min</span></div>
          </div>
        </div>
        <!-- Next Meetings (dynamic) -->
        <div id="freeMeetings"></div>
      </div>
    </div>
    <!-- OCCUPIED STATE (HTML/CSS) -->
    <div id="occupiedCard" class="card-state">
      <div class="occ-card">
        <!-- Header -->
        <div class="occ-header">
          <span class="occ-title">OCCUPIED</span>
          <div class="occ-fornext">
            <span class="occ-fornext-label">FOR THE NEXT</span>
            <span class="occ-fornext-time" id="liveCountdown">60:00</span>
          </div>
        </div>
        <!-- Actual Meeting -->
        <div class="occ-slash"><span>ACTUAL MEETING</span></div>
        <div class="occ-meeting-row">
          <div class="occ-meeting-info" id="occMeetingInfo">display book now:<br>jakub reken</div>
          <div class="occ-meeting-time" id="occMeetingTime">11:00 - 12:00</div>
          <div class="info-btn">i</div>
        </div>
        <!-- Timer Bar -->
        <div class="occ-timer-track" id="timerTrack">
          <div class="occ-timer-fill" id="timerFill"></div>
          <div class="occ-timer-dot" id="timerDot"></div>
        </div>
        <!-- Extend Meeting -->
        <div class="occ-extend-row">
          <span class="occ-extend-label">EXTEND MEETING</span>
          <div class="occ-extend-buttons">
            <div class="occ-ext-btn" id="extBtn15" data-ext="15"><span class="num">15</span><span class="unit">min</span></div>
            <div class="occ-ext-btn" id="extBtn30" data-ext="30"><span class="num">30</span><span class="unit">min</span></div>
            <div class="occ-ext-btn" id="extBtn60" data-ext="60"><span class="num">60</span><span class="unit">min</span></div>
          </div>
        </div>
        <!-- Next Meetings (dynamic) -->
        <div id="occMeetings"></div>
      </div>
    </div>
  </div>

  <!-- ═══ LIGHTS ═══ -->
  <div class="section draggable" draggable="true" data-name="lights">
    <div class="drag-handle"></div>
    <img src="occupy-assets/W56aF.png" alt="">
    <div class="tile-flash" data-group="lights" data-idx="0" style="left:24px;top:32px;width:126px;height:117px;"></div>
    <div class="tile-flash" data-group="lights" data-idx="1" style="left:160px;top:32px;width:126px;height:117px;"></div>
    <div class="tile-flash" data-group="lights" data-idx="2" style="left:297px;top:32px;width:126px;height:117px;"></div>
    <div class="tile-flash" data-group="lights" data-idx="3" style="left:433px;top:32px;width:126px;height:117px;"></div>
    <div class="tile-flash" data-group="lights" data-idx="4" style="left:570px;top:32px;width:126px;height:117px;"></div>
  </div>

  <!-- ═══ BLINDS ═══ -->
  <div class="section draggable" draggable="true" data-name="blinds">
    <div class="drag-handle"></div>
    <img src="occupy-assets/UCkPe.png" alt="">
    <div class="tile-flash" data-group="blinds" data-idx="0" style="left:24px;top:36px;width:159px;height:146px;"></div>
    <div class="tile-flash" data-group="blinds" data-idx="1" style="left:195px;top:36px;width:159px;height:146px;"></div>
    <div class="tile-flash" data-group="blinds" data-idx="2" style="left:366px;top:36px;width:159px;height:146px;"></div>
    <div class="tile-flash" data-group="blinds" data-idx="3" style="left:537px;top:36px;width:159px;height:146px;"></div>
  </div>

  <!-- ═══ HEY TRICSY ═══ -->
  <div class="section draggable" draggable="true" data-name="tricsy">
    <div class="drag-handle"></div>
    <img src="occupy-assets/yZm7M.png" alt="">
    <div class="hotspot" data-action="tricsy" style="left:48px;top:75px;width:56px;height:56px;border-radius:28px;"></div>
  </div>

  <!-- ═══ RECORDING ═══ -->
  <div class="section draggable rec-section" draggable="true" data-name="recording">
    <div class="drag-handle"></div>
    <div class="rec-slash">
      <div class="line"></div>
      <div class="label-wrap">
        <div class="dot"></div>
        <span class="txt">RECORDING</span>
        <div class="dot"></div>
      </div>
    </div>
    <div class="rec-card">
      <div class="rec-btn" id="recBtn">
        <div class="rec-dot-inner"></div>
      </div>
      <span class="rec-label">Recording</span>
      <span class="rec-time" id="recTime">00:00</span>
      <div class="rec-waveform" id="recWaveform"></div>
      <div class="rec-controls">
        <div class="rec-ctrl"><svg viewBox="0 0 11 13"><rect x="0" y="0" width="4" height="13" rx="1"/><rect x="7" y="0" width="4" height="13" rx="1"/></svg></div>
        <div class="rec-ctrl"><svg viewBox="0 0 11 11"><rect x="0" y="0" width="11" height="11" rx="2"/></svg></div>
      </div>
    </div>
  </div>

  <!-- ═══ SERVICES ═══ -->
  <div class="section draggable" draggable="true" data-name="services">
    <div class="drag-handle"></div>
    <img src="occupy-assets/PIqES.png" alt="">
    <div class="tile-flash" data-group="services" data-idx="0" style="left:24px;top:35px;width:159px;height:146px;"></div>
    <div class="tile-flash" data-group="services" data-idx="1" style="left:195px;top:35px;width:159px;height:146px;"></div>
    <div class="tile-flash" data-group="services" data-idx="2" style="left:365px;top:35px;width:159px;height:146px;"></div>
    <div class="tile-flash" data-group="services" data-idx="3" style="left:536px;top:35px;width:159px;height:146px;"></div>
  </div>

  <!-- ═══ ENVIRONMENT ═══ -->
  <div class="section draggable" draggable="true" data-name="environment">
    <div class="drag-handle"></div>
    <img src="occupy-assets/r9Zk9.png" alt="">
  </div>

  <!-- ═══ WEATHER ═══ -->
  <div class="section draggable" draggable="true" data-name="weather">
    <div class="drag-handle"></div>
    <img src="occupy-assets/ETRs6.png" alt="">
  </div>

  <!-- Footer -->
  <div class="panel-footer"><img src="bh-logo-white.svg" alt="Biometrics House"></div>

</div>
<div class="toast" id="toast"></div>

<script>
// ── Live Clock ──
function updateClock(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  document.getElementById('liveClock').textContent=h+':'+m;
}
updateClock();
setInterval(updateClock,1000);

// ── Meeting Schedule & State ──
// Simulated schedule: next meeting is 90 min from now
const NOW_BOOT=Date.now();
const SCHEDULE=[
  {start:NOW_BOOT+90*60*1000, end:NOW_BOOT+150*60*1000, title:'Java Engineering INNOVA..', sub:'julia.sustakova'},
  {start:NOW_BOOT+180*60*1000, end:NOW_BOOT+210*60*1000, title:'Sharry — status meeting', sub:'Peter Novak'},
  {start:NOW_BOOT+240*60*1000, end:NOW_BOOT+300*60*1000, title:'TRICSY UX display', sub:'jakub. reken'}
];

let countdownInterval=null;
let freeInterval=null;
const freeCard=document.getElementById('freeCard');
const occupiedCard=document.getElementById('occupiedCard');

// Current meeting
let meetingStartMs=0;
let meetingEndMs=0;

function getNextMeetingAfter(timeMs){
  return SCHEDULE.find(m=>m.start>timeMs)||null;
}

function getGapMinutes(fromMs){
  const next=getNextMeetingAfter(fromMs);
  if(!next) return 999;
  return Math.floor((next.start-fromMs)/60000);
}

function formatTime(d){
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

// ── FREE Card Logic ──
function showFreeCard(){
  freeCard.classList.add('active');
  occupiedCard.classList.remove('active');
  clearInterval(countdownInterval);
  startFreeUpdater();
}

function startFreeUpdater(){
  clearInterval(freeInterval);
  updateFreeState();
  freeInterval=setInterval(updateFreeState,10000);
}

function updateFreeState(){
  const now=Date.now();
  const gapMin=getGapMinutes(now);
  // Update "FOR THE NEXT" display
  document.getElementById('freeCountdown').textContent=gapMin+'min.';
  // Enable/disable book buttons
  [15,30,60].forEach(m=>{
    const btn=document.getElementById('freeBtn'+m);
    if(m>gapMin){btn.classList.add('disabled');}
    else{btn.classList.remove('disabled');}
  });
  // Render next meetings
  renderFreeMeetings();
}

function renderFreeMeetings(){
  const container=document.getElementById('freeMeetings');
  const now=Date.now();
  const upcoming=SCHEDULE.filter(m=>m.start>now).slice(0,3);
  let html='';
  upcoming.forEach(m=>{
    const startStr=formatTime(new Date(m.start));
    const endStr=formatTime(new Date(m.end));
    html+='<div class="free-slash"><span>NEXT MEETING</span></div>';
    html+='<div class="free-meeting-row">';
    html+='<div class="free-meeting-info">'+m.title+'<br>'+m.sub+'</div>';
    html+='<div class="free-meeting-time">'+startStr+' - '+endStr+'</div>';
    html+='<div class="info-btn">i</div>';
    html+='</div>';
  });
  container.innerHTML=html;
}

// ── OCCUPIED Card Logic ──
function showOccupiedCard(minutes){
  freeCard.classList.remove('active');
  occupiedCard.classList.add('active');
  clearInterval(freeInterval);

  const now=Date.now();
  meetingStartMs=now;
  meetingEndMs=now+minutes*60*1000;

  // Set current meeting display
  document.getElementById('occMeetingInfo').innerHTML='display book now:<br>jakub reken';
  document.getElementById('occMeetingTime').textContent=
    formatTime(new Date(meetingStartMs))+' - '+formatTime(new Date(meetingEndMs));

  // Render next meetings in occupied card
  renderOccMeetings();

  updateExtendButtons();
  startCountdown();
}

function extendMeeting(minutes){
  meetingEndMs+=minutes*60*1000;
  // Reset timer bar - new start from now
  meetingStartMs=Date.now();
  document.getElementById('occMeetingTime').textContent=
    formatTime(new Date(Date.now()))+' - '+formatTime(new Date(meetingEndMs));
  updateExtendButtons();
  renderOccMeetings();
  showToast('Meeting extended by '+minutes+' minutes until '+formatTime(new Date(meetingEndMs)));
}

function updateExtendButtons(){
  const gapMin=getGapMinutes(meetingEndMs);
  [15,30,60].forEach(m=>{
    const btn=document.getElementById('extBtn'+m);
    if(m>gapMin){btn.classList.add('disabled');}
    else{btn.classList.remove('disabled');}
  });
}

function startCountdown(){
  clearInterval(countdownInterval);
  updateOccupiedState();
  countdownInterval=setInterval(updateOccupiedState,1000);
}

function updateOccupiedState(){
  const now=Date.now();
  const remainMs=meetingEndMs-now;
  const totalMs=meetingEndMs-meetingStartMs;

  if(remainMs<=0){
    showFreeCard();
    showToast('Meeting ended — room is FREE');
    return;
  }

  // Countdown text
  const remainSec=Math.ceil(remainMs/1000);
  const min=Math.floor(remainSec/60);
  const sec=remainSec%60;
  document.getElementById('liveCountdown').textContent=
    String(min).padStart(2,'0')+':'+String(sec).padStart(2,'0');

  // Timer bar progress
  const elapsed=now-meetingStartMs;
  const progress=Math.min(elapsed/totalMs,1);
  const trackWidth=document.getElementById('timerTrack').offsetWidth;
  const fillWidth=progress*trackWidth;
  document.getElementById('timerFill').style.width=fillWidth+'px';
  document.getElementById('timerDot').style.left=Math.max(0,fillWidth-11)+'px';
}

function renderOccMeetings(){
  const container=document.getElementById('occMeetings');
  const upcoming=SCHEDULE.filter(m=>m.start>meetingEndMs).slice(0,2);
  let html='';
  upcoming.forEach(m=>{
    const startStr=formatTime(new Date(m.start));
    const endStr=formatTime(new Date(m.end));
    html+='<div class="occ-slash"><span>NEXT MEETING</span></div>';
    html+='<div class="occ-meeting-row">';
    html+='<div class="occ-meeting-info">'+m.title+'<br>'+m.sub+'</div>';
    html+='<div class="occ-meeting-time">'+startStr+' - '+endStr+'</div>';
    html+='<div class="info-btn">i</div>';
    html+='</div>';
  });
  container.innerHTML=html;
}

// Start in FREE mode
startFreeUpdater();

// ── Toast ──
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}

// ── Inside Booking (FREE → OCCUPIED) ──
document.querySelectorAll('.free-btn').forEach(el=>{
  el.addEventListener('click',()=>{
    if(el.classList.contains('disabled'))return;
    const min=parseInt(el.dataset.min);
    showOccupiedCard(min);
    showToast('Room booked for '+min+' minutes until '+formatTime(new Date(Date.now()+min*60*1000)));
  });
});

// ── Extend Meeting ──
document.querySelectorAll('.occ-ext-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(btn.classList.contains('disabled'))return;
    const min=parseInt(btn.dataset.ext);
    extendMeeting(min);
  });
});

// ── Tile Flash ──
document.querySelectorAll('.tile-flash').forEach(el=>{
  el.addEventListener('click',()=>{
    const group=el.dataset.group;
    document.querySelectorAll('.tile-flash[data-group="'+group+'"]').forEach(e=>e.classList.remove('flash'));
    el.classList.add('flash');
    setTimeout(()=>el.classList.remove('flash'),1000);
    const names={
      lights:['Focus','Meeting','Presentation','Auto','Off'],
      blinds:['Open','Closed','Auto','Partly open'],
      services:['ITO support','Reception call','Ordering','Cleaning needed']
    };
    const idx=parseInt(el.dataset.idx);
    if(names[group]&&names[group][idx])showToast(names[group][idx]);
  });
});

// ── Tricsy ──
let tricsyActive=false;
document.querySelector('[data-action="tricsy"]').addEventListener('click',()=>{
  tricsyActive=!tricsyActive;
  showToast(tricsyActive?'Tricsy is listening...':'Tricsy stopped');
});

// ── Recording ──
let recSeconds=0,recActive=false,recInterval=null;

(function(){
  const wf=document.getElementById('recWaveform');
  for(let i=0;i<38;i++){
    const bar=document.createElement('span');
    bar.style.height=(4+Math.random()*18)+'px';
    bar.style.animationDelay=(Math.random()*1.2).toFixed(2)+'s';
    wf.appendChild(bar);
  }
})();

function updateRecTime(){
  const m=String(Math.floor(recSeconds/60)).padStart(2,'0');
  const s=String(recSeconds%60).padStart(2,'0');
  document.getElementById('recTime').textContent=m+':'+s;
}

document.getElementById('recBtn').addEventListener('click',()=>{
  const btn=document.getElementById('recBtn');
  const timer=document.getElementById('recTime');
  const wf=document.getElementById('recWaveform');
  if(!recActive){
    recActive=true;
    recSeconds=0;
    updateRecTime();
    btn.classList.add('active');
    timer.classList.add('active');
    wf.classList.add('active');
    recInterval=setInterval(()=>{recSeconds++;updateRecTime();},1000);
    showToast('Recording started');
  }else{
    clearInterval(recInterval);
    recActive=false;
    btn.classList.remove('active');
    timer.classList.remove('active');
    wf.classList.remove('active');
    showToast('Recording stopped');
  }
});

// ── Drag & Drop reordering ──
let draggedEl=null;

document.querySelectorAll('.draggable').forEach(section=>{
  section.addEventListener('dragstart',(e)=>{
    draggedEl=section;
    section.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain','');
  });

  section.addEventListener('dragend',()=>{
    section.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
    draggedEl=null;
  });

  section.addEventListener('dragover',(e)=>{
    e.preventDefault();
    e.dataTransfer.dropEffect='move';
    if(section!==draggedEl){
      section.classList.add('drag-over');
    }
  });

  section.addEventListener('dragleave',()=>{
    section.classList.remove('drag-over');
  });

  section.addEventListener('drop',(e)=>{
    e.preventDefault();
    section.classList.remove('drag-over');
    if(draggedEl&&draggedEl!==section){
      const panel=document.getElementById('panel');
      const children=[...panel.querySelectorAll('.draggable')];
      const fromIdx=children.indexOf(draggedEl);
      const toIdx=children.indexOf(section);
      if(fromIdx<toIdx){
        section.after(draggedEl);
      }else{
        section.before(draggedEl);
      }
      showToast('Section moved');
    }
  });
});
</script>
</body>
</html>
