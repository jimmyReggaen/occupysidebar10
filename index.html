<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720">
<title>Biometrics House — OCCUPY Room Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Montserrat',sans-serif;
  background:#111;
  display:flex;justify-content:center;align-items:flex-start;
  min-height:100vh;padding:20px 0;
  font-kerning:normal;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
.panel{
  width:720px;background:#000;position:relative;
  display:flex;flex-direction:column;gap:4px;overflow:hidden;
}
.section{position:relative;width:720px;flex-shrink:0;}
.section img{display:block;width:720px;height:auto;}

/* ── Drag & Drop ── */
.section.draggable{user-select:none;}
.section.draggable:active{}
.section.dragging{
  opacity:0.5;
  transform:scale(1.015);
  box-shadow:0 12px 40px rgba(0,0,0,0.5),0 0 0 1px rgba(69,144,255,0.15);
  border-radius:8px;
  z-index:50;
  transition:opacity 0.25s ease-out,transform 0.25s ease-out,box-shadow 0.25s ease-out;
}
.section.drag-over{border-top:3px solid #4590FF;}
.drag-handle{
  position:absolute;top:4px;right:4px;z-index:10;
  width:28px;height:28px;border-radius:6px;
  background:rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;
  opacity:0.5;
}
.drag-handle::before{
  content:'⋮⋮';font-size:14px;color:rgba(255,255,255,0.4);letter-spacing:2px;
}

/* ── Hotspot ── */
.hotspot{
  position:absolute;cursor:pointer;z-index:5;border-radius:16px;
  transition:background 0.15s;
}
.hotspot:active{background:rgba(255,255,255,0.08)}

/* ── Tile flash ── */
.tile-flash{
  position:absolute;z-index:5;  background:transparent;
  transition:background 0.2s ease-out,box-shadow 0.2s ease-out,transform 0.2s ease-out;
  border-radius:16px;
}
.tile-flash:active{transform:scale(0.97);transition-duration:0.08s;}
.tile-flash.flash{
  background:linear-gradient(160deg,rgba(27,0,226,0.65) 0%,rgba(14,0,113,0.65) 100%);
  box-shadow:0 0 20px rgba(27,0,226,0.3);
  animation:tile-pulse 0.35s ease-out;
}
@keyframes tile-pulse{
  0%{transform:scale(0.95);opacity:0.7;}
  50%{transform:scale(1.02);}
  100%{transform:scale(1);opacity:1;}
}

/* ── Auto Toggle area (invisible clickable zone) ── */
.auto-toggle-area{
  position:absolute;z-index:6;}
/* When auto is ON, dim only button areas */
.section.auto-on .tile-flash{
  pointer-events:none;
  background:rgba(0,0,0,0.65);
  border-radius:16px;
  transition:background 0.3s;
}

/* ── Recording section (pure HTML/CSS) ── */
.rec-section{position:relative;width:720px}
.rec-slash{
  display:flex;align-items:center;
  height:20px;padding:0 24px;gap:6px;
}
.rec-slash .line{display:none}
.rec-slash .label-wrap{
  display:flex;align-items:center;gap:6px;flex-shrink:0;
}
.rec-slash::before,.rec-slash::after{
  content:'';flex:1;height:1px;background:#ffffffcc;
}
.rec-slash .bracket{font-size:14px;color:#ffffffcc;font-weight:300;}
.rec-slash .dot{display:none}
.rec-slash span.txt{font-size:12px;font-weight:600;color:#ffffffcc;letter-spacing:2px;text-transform:uppercase}
.rec-card{
  margin:14px 24px 0;border-radius:20px;background:#0d0f1a;
  border:1px solid #ffffff12;
  padding:0 26px;height:80px;
  display:flex;align-items:center;gap:12px;
  position:relative;overflow:hidden;
  transition:background 0.4s,border-color 0.4s;
}
.rec-card.active{
  background:#FA003F;
  border-color:rgba(255,255,255,0.15);
}
.rec-card.muted{
  background:#1b00e2;
  border-color:rgba(69,144,255,0.3);
}
.rec-card::before{
  content:'';position:absolute;inset:1px;border-radius:19px;
  background:linear-gradient(212deg,rgba(255,255,255,0.12) 0%,transparent 55%);
  pointer-events:none;
}
.rec-btn{
  width:46px;height:46px;border-radius:23px;  background:rgba(100,116,139,0.19);position:relative;
  border:1.5px solid rgba(100,116,139,0.45);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(100,116,139,0.37),0 0 24px rgba(100,116,139,0.31),0 4px 12px rgba(0,0,0,0.13);
  transition:background 0.3s ease-out,box-shadow 0.3s ease-out,border-color 0.3s ease-out,transform 0.15s ease-out;
  flex-shrink:0;
}
.rec-btn:active{transform:scale(0.94);transition-duration:0.08s;}
.rec-card.active .rec-btn{
  background:rgba(250,0,63,0.35);
  border-color:rgba(255,255,255,0.3);
  box-shadow:0 2px 10px rgba(250,0,63,0.4),0 0 24px rgba(250,0,63,0.3),0 4px 12px rgba(0,0,0,0.13);
}
.rec-card.muted .rec-btn{
  background:rgba(69,144,255,0.25);
  border-color:rgba(255,255,255,0.3);
  box-shadow:0 2px 10px rgba(69,144,255,0.3),0 0 24px rgba(69,144,255,0.2),0 4px 12px rgba(0,0,0,0.13);
}
.rec-btn .rec-dot-inner{
  width:14px;height:14px;border-radius:50%;
  background:#64748B;transition:background 0.3s;
  box-shadow:0 0 8px rgba(100,116,139,0.66);
}
.rec-card.active .rec-btn .rec-dot-inner{
  background:#fff;
  box-shadow:0 0 8px rgba(255,255,255,0.5);
  animation:pulse-rec 1.5s ease-in-out infinite;
}
.rec-card.muted .rec-btn .rec-dot-inner{
  background:#4590ff;
  box-shadow:0 0 8px rgba(69,144,255,0.5);
  animation:none;
}
.rec-btn.active{
  background:rgba(250,0,63,0.25);
  border-color:rgba(250,0,63,0.5);
  box-shadow:0 2px 10px rgba(250,0,63,0.4),0 0 24px rgba(250,0,63,0.3),0 4px 12px rgba(0,0,0,0.13);
}
.rec-btn.active .rec-dot-inner{
  background:#FA003F;
  box-shadow:0 0 8px rgba(250,0,63,0.7);
  animation:pulse-rec 1.5s ease-in-out infinite;
}
@keyframes pulse-rec{
  0%,100%{box-shadow:0 0 6px rgba(250,0,63,0.5)}
  50%{box-shadow:0 0 14px 4px rgba(250,0,63,0.4)}
}
.rec-label{
  font-family:'Montserrat',sans-serif;font-size:16px;font-weight:600;
  color:rgba(255,255,255,0.87);letter-spacing:1.5px;
  flex-shrink:0;
}
.rec-time{
  font-family:'Montserrat',sans-serif;font-size:16px;font-weight:600;
  color:#64748B;letter-spacing:0.5px;
  transition:color 0.4s;flex-shrink:0;
  font-variant-numeric:tabular-nums;
}
.rec-card.active .rec-time{color:#fff}
.rec-card.muted .rec-time{color:rgba(255,255,255,0.6)}
.rec-waveform{
  flex:1;height:28px;display:flex;align-items:center;gap:2px;
  overflow:hidden;margin:0 4px;
}
.rec-waveform span{
  width:3px;border-radius:2px;background:#64748B66;
  flex-shrink:0;transition:background 0.4s;
}
.rec-card.active .rec-waveform span{
  background:rgba(255,255,255,0.5);
  animation:wave-active 0.8s ease-in-out infinite;
}
.rec-card.muted .rec-waveform span{
  background:rgba(69,144,255,0.4);
  animation:none;
}
@keyframes wave-active{
  0%,100%{transform:scaleY(0.3);opacity:0.6}
  50%{transform:scaleY(1);opacity:1}
}
.rec-controls{display:flex;gap:8px;flex-shrink:0}
.rec-ctrl{
  width:46px;height:46px;border-radius:23px;  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(12px);
  box-shadow:0 2px 8px rgba(255,255,255,0.15);
  transition:background 0.2s ease-out,border-color 0.2s ease-out;
}
.rec-card.active .rec-ctrl{
  border-color:rgba(255,255,255,0.3);
}
.rec-card.muted .rec-ctrl{
  border-color:rgba(69,144,255,0.3);
}
.rec-ctrl:active{background:rgba(255,255,255,0.22);}
.rec-ctrl svg{width:18px;height:18px;fill:rgba(255,255,255,0.7);color:rgba(255,255,255,0.7)}

/* ── OCCUPIED Card (HTML) ── */
.occ-card{
  width:672px;height:473px;margin:0 24px;border-radius:26px;overflow:hidden;
  background:#FA003F;position:relative;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:14px 0 18px;
  background-image:
    radial-gradient(ellipse 250px 190px at 25% 0%,rgba(255,85,85,0.67) 0%,transparent 100%),
    radial-gradient(ellipse 280px 180px at 85% 55%,rgba(221,68,85,0.53) 0%,transparent 100%),
    radial-gradient(ellipse 220px 155px at 65% 5%,rgba(255,102,102,0.53) 0%,transparent 100%),
    radial-gradient(ellipse 240px 165px at 15% 60%,rgba(221,51,85,0.53) 0%,transparent 100%),
    radial-gradient(ellipse 175px 120px at 40% 25%,rgba(255,136,136,0.33) 0%,transparent 100%);
}

.occ-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 30px;height:60px;
}
.occ-title{font-size:44px;font-weight:700;color:#fff;line-height:1;}
.occ-fornext{display:flex;align-items:baseline;gap:12px;}
.occ-fornext-label{font-size:18px;font-weight:600;color:rgba(255,255,255,0.85);letter-spacing:0.5px;}
.occ-fornext-time{font-size:36px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;}
.occ-slash{
  display:flex;align-items:center;
  height:20px;padding:0 30px;margin:8px 0 0;gap:6px;
}
.occ-slash::before,.occ-slash::after{
  content:'';flex:1;height:1px;background:#fff;
}
.occ-slash .bracket{font-size:14px;color:#fff;font-weight:300;}
.occ-slash span.txt{
  font-size:12px;font-weight:600;color:#fff;letter-spacing:2px;
  text-transform:uppercase;flex-shrink:0;
}
.occ-meeting-row{
  display:flex;align-items:center;
  padding:6px 30px;
  min-height:58px;
}
.occ-meeting-info{
  font-size:20px;font-weight:600;color:#fff;line-height:1.3;flex:1;
}
.occ-meeting-time{
  font-size:36px;font-weight:700;color:#fff;letter-spacing:-0.5px;line-height:1.1;
  text-align:right;margin-right:20px;font-variant-numeric:tabular-nums;
}
/* Timer Bar */
.occ-timer-track{
  position:relative;height:17px;margin:4px 30px;
  background:rgba(120,0,30,0.52);border-radius:9px;
}
.occ-timer-fill{
  position:absolute;left:0;top:0;height:17px;border-radius:9px;
  background:linear-gradient(to left,#FFD700,#FFB800 20%,#FF8C00AA 40%,#FF660055 65%,#cc330022 100%);
  transition:width 1s linear;
}
.occ-timer-dot{
  position:absolute;top:-3px;width:23px;height:23px;border-radius:50%;
  background:#FFD700;
  box-shadow:0 0 8px rgba(255,215,0,0.53),0 0 4px rgba(255,215,0,0.67);
  transition:left 1s linear;
}
.occ-timer-dot.urgent{
  animation:dot-urgent 1.2s ease-in-out infinite;
}
@keyframes dot-urgent{
  0%,100%{box-shadow:0 0 8px rgba(255,215,0,0.53),0 0 4px rgba(255,215,0,0.67);}
  50%{box-shadow:0 0 16px rgba(255,215,0,0.8),0 0 32px rgba(255,165,0,0.4);}
}
/* Extend Buttons */
.occ-extend-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 30px;
}
.occ-extend-label{
  font-size:16px;font-weight:700;color:#fff;letter-spacing:0.5px;
}
.occ-extend-buttons{display:flex;gap:6px;}
.occ-ext-btn{
  width:137px;height:47px;border-radius:65px;  background:rgba(255,255,255,0.33);
  border:1.5px solid rgba(255,255,255,0.35);
  backdrop-filter:blur(24px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 0.2s ease-out,background 0.2s ease-out,transform 0.2s ease-out,box-shadow 0.2s ease-out;
  box-shadow:0 0 8px rgba(0,0,0,0.09),0 0 4px rgba(255,255,255,0.27);
}
.occ-ext-btn .num{font-size:28px;font-weight:700;color:#fff;line-height:1;letter-spacing:-0.3px;}
.occ-ext-btn .unit{font-size:11px;font-weight:600;color:rgba(255,255,255,0.85);line-height:1;letter-spacing:1.5px;text-transform:uppercase;}
.occ-ext-btn.disabled{
  opacity:0.3;pointer-events:none;
  background:rgba(255,255,255,0.08);
}
.occ-ext-btn:not(.disabled):active{
  background:rgba(255,255,255,0.55);
  transform:translateY(1px) scale(0.97);
  box-shadow:0 1px 4px rgba(0,0,0,0.12);
  transition-duration:0.08s;
}

    radial-gradient(ellipse 240px 165px at 15% 60%,rgba(51,85,221,0.4) 0%,transparent 100%),
    radial-gradient(ellipse 175px 120px at 40% 25%,rgba(100,100,255,0.3) 0%,transparent 100%);

.free-line{height:1px;background:rgba(255,255,255,0.25);margin:8px 30px 0;}
.free-book-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 30px;
}
.free-book-label{font-size:16px;font-weight:700;color:#fff;}
.free-book-buttons{display:flex;gap:6px;}
.free-btn{
  width:137px;height:47px;border-radius:65px;  background:rgba(255,255,255,0.33);

}
.free-btn .num{font-size:28px;font-weight:700;color:#fff;line-height:1;letter-spacing:-0.3px;}
.free-btn .unit{font-size:11px;font-weight:600;color:rgba(255,255,255,0.85);line-height:1;letter-spacing:1.5px;text-transform:uppercase;}
.free-btn.disabled{
  opacity:0.3;pointer-events:none;
  background:rgba(255,255,255,0.08);
}
.free-btn:not(.disabled):active{

  transform:translateY(1px) scale(0.97);
  box-shadow:0 1px 4px rgba(0,0,0,0.12);
  transition-duration:0.08s;
}
/* Free card meeting rows */
.free-slash{
  display:flex;align-items:center;
  height:20px;padding:0 30px;margin:8px 0 0;gap:6px;
}
.free-slash::before,.free-slash::after{
  content:'';flex:1;height:1px;background:#fff;
}
.free-slash .bracket{font-size:14px;color:#fff;font-weight:300;}
.free-slash span.txt{
  font-size:12px;font-weight:600;color:#fff;letter-spacing:2px;
  text-transform:uppercase;flex-shrink:0;
}
.free-meeting-row{
  display:flex;align-items:center;
  padding:6px 30px;
  min-height:58px;
}
.free-meeting-info{
  font-size:20px;font-weight:600;color:#fff;line-height:1.3;flex:1;
}
.free-meeting-time{
  font-size:36px;font-weight:700;color:#fff;letter-spacing:-0.5px;line-height:1.1;
  text-align:right;margin-right:20px;font-variant-numeric:tabular-nums;
}
/* Info button (shared) */
.info-btn{
  width:32px;height:32px;border-radius:16px;flex-shrink:0;
  background:rgba(255,255,255,0.27);
  backdrop-filter:blur(20px);
  border:1.5px solid rgba(255,255,255,0.4);
  display:flex;align-items:center;justify-content:center;
  font-family:'Montserrat',sans-serif;font-size:18px;font-style:italic;
  font-weight:600;color:rgba(255,255,255,0.93);
  box-shadow:0 2px 6px rgba(0,0,0,0.12),0 1px 3px rgba(255,255,255,0.2);
  cursor:pointer;transition:background 0.2s ease-out,border-color 0.2s ease-out;
}
.info-btn:active{background:rgba(255,255,255,0.5);}

/* ── Card state switching (crossfade) ── */
.card-state{
  position:relative;
  opacity:0;
  transform:scale(0.98);
  transition:opacity 0.4s ease-out,transform 0.4s ease-out;
  height:0;overflow:hidden;pointer-events:none;
}
.card-state.active{
  opacity:1;
  transform:scale(1);
  height:auto;overflow:visible;pointer-events:auto;
}
/* Success flash on card activation */
.card-state.flash-in{animation:card-flash 0.6s ease-out;}
@keyframes card-flash{
  0%{filter:brightness(1.3);}
  100%{filter:brightness(1);}
}
.card-state img{display:block;width:720px;height:auto;}
.card-state .hotspot{
  position:absolute;cursor:pointer;z-index:5;border-radius:65px;
  transition:background 0.15s;
}
.card-state .hotspot:active{background:rgba(255,255,255,0.15)}

/* ── Live clock overlay (status bar pill) ── */
.live-clock{
  position:absolute;z-index:6;
  font-family:'Montserrat',sans-serif;
  font-size:20px;font-weight:600;color:#FFFFFFCC;
  line-height:42px;
  font-variant-numeric:tabular-nums;
}

/* ── Countdown overlay (occupied card) ── */
.live-countdown{
  position:absolute;z-index:6;
  font-family:'Montserrat',sans-serif;
  font-size:32px;font-weight:700;color:#fff;
  text-align:right;line-height:1;
}

/* ── Next Meeting Warning ── */
/* OCCUPIED card (red) → warning full blue */
/* Warning: time text swap */
.warn-time{
  position:relative;
}
.warn-time .time-normal{
  transition:opacity 0.3s;
}
.warn-time{
  display:flex;align-items:center;
}
.warn-time .time-alert{
  display:none;
}
.warn-time.flash .time-normal{display:none;}
.warn-time.flash .time-alert{
  display:flex;align-items:center;
}
.warn-time .time-alert span{
  font-family:'Montserrat',sans-serif;
  font-size:16px;font-weight:700;color:#FA003F;
  padding:8px 18px;border-radius:10px;
  letter-spacing:0.5px;white-space:nowrap;
  background:#FFD700;
  margin-right:20px;
}
.warn-time.flash .time-normal{opacity:0;}
.warn-time.flash .time-alert{opacity:1;pointer-events:auto;}

/* ── Toast ── */
.toast{
  position:fixed;bottom:40px;left:50%;
  transform:translateX(-50%) translateY(12px) scale(0.96);
  background:rgba(27,0,226,0.85);
  backdrop-filter:blur(20px);
  color:#fff;padding:14px 28px;border-radius:14px;
  font-size:14px;font-weight:600;letter-spacing:0.5px;
  border:1px solid rgba(69,144,255,0.2);
  box-shadow:0 8px 32px rgba(27,0,226,0.3),0 2px 8px rgba(0,0,0,0.2);
  opacity:0;transition:opacity 0.3s ease-out,transform 0.3s ease-out;
  z-index:100;pointer-events:none;white-space:nowrap;
}
.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0) scale(1);
}

/* ── Meeting Detail Overlay ── */
.card-dimmed{
  filter:brightness(0.7) saturate(0.75);
  transition:filter 0.35s ease;
}
.meeting-overlay{
  position:absolute;top:0;left:24px;right:24px;bottom:0;z-index:20;
  display:flex;flex-direction:column;
  padding:20px 30px 16px;
  border-radius:26px;
  background:rgba(0,0,0,0.25);
  backdrop-filter:blur(14px);
  overflow:hidden;
  opacity:0;pointer-events:none;
  transform:scale(1.02);
  transition:opacity 0.35s ease-out,transform 0.35s ease-out,backdrop-filter 0.35s ease-out;
}
.meeting-overlay.visible{
  opacity:1;pointer-events:auto;
  transform:scale(1);
}
.mo-close{
  position:absolute;top:14px;right:16px;
  width:40px;height:40px;border-radius:20px;

// ── Live Clock ──
function updateClock(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  document.getElementById('liveClock').textContent=h+':'+m;
}
updateClock();
setInterval(updateClock,1000);

// Live date on calendar pill
function updateDate(){

function getNextMeetingAfter(timeMs){
  return SCHEDULE.find(m=>m.start>timeMs)||null;

function getGapMinutes(fromMs){
  const next=getNextMeetingAfter(fromMs);
  if(!next) return 999;
  return Math.floor((next.start-fromMs)/60000);
}

function formatTime(d){
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');

function startFreeUpdater(){
  clearInterval(freeInterval);
  updateFreeState();
  freeInterval=setInterval(updateFreeState,1000);
}

function updateFreeState(){
  const now=Date.now();
  const next=getNextMeetingAfter(now);
  const gapMs=next?(next.start-now):999*60*1000;
  const gapMin=Math.floor(gapMs/60000);
  // Update "FOR THE NEXT" display as minutes only
  const mm=Math.ceil(gapMs/60000);
  document.getElementById('freeCountdown').textContent=mm+'min.';
  // Enable/disable book buttons
  [15,30,60].forEach(m=>{
    const btn=document.getElementById('freeBtn'+m);
    if(m>gapMin){btn.classList.add('disabled');}
    else{btn.classList.remove('disabled');}
  });
  // Render next meetings
  renderFreeMeetings();
}

function updateOccupiedState(){
  const now=Date.now();
  const remainMs=meetingEndMs-now;
  const totalMs=meetingEndMs-meetingStartMs;

  if(remainMs<=0){
    showFreeCard();
    showToast('Meeting ended — room is FREE');
    return;
  }

  // Countdown text — minutes only
  const min=Math.ceil(remainMs/60000);
  document.getElementById('liveCountdown').textContent=min+'min.';


  // Timer bar progress (elapsed time, left to right, gradient trails behind dot)
  const elapsed=now-meetingStartMs;
  const progress=Math.min(elapsed/totalMs,1);
  const trackWidth=document.getElementById('timerTrack').offsetWidth;
  const fillWidth=progress*trackWidth;
  document.getElementById('timerFill').style.width=fillWidth+'px';
  const dot=document.getElementById('timerDot');
  dot.style.left=Math.max(0,fillWidth-11)+'px';
  dot.classList.toggle('urgent',remainMs<5*60*1000);
  renderOccMeetings();
}

// ── Drag & Drop reordering ──
let draggedEl=null;

document.querySelectorAll('.draggable').forEach(section=>{
  section.addEventListener('dragstart',(e)=>{
    draggedEl=section;
    section.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain','');
  });

  section.addEventListener('dragend',()=>{
    section.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
    draggedEl=null;
  });

  section.addEventListener('dragover',(e)=>{
    e.preventDefault();
    e.dataTransfer.dropEffect='move';
    if(section!==draggedEl){
      section.classList.add('drag-over');
    }
  });

  section.addEventListener('dragleave',()=>{
    section.classList.remove('drag-over');
  });

  section.addEventListener('drop',(e)=>{
    e.preventDefault();
    section.classList.remove('drag-over');
    if(draggedEl&&draggedEl!==section){
      const panel=document.getElementById('panel');
      const children=[...panel.querySelectorAll('.draggable')];
      const fromIdx=children.indexOf(draggedEl);
      const toIdx=children.indexOf(section);
      if(fromIdx<toIdx){
        section.after(draggedEl);
      }else{
        section.before(draggedEl);
      }
      showToast('Section moved');
    }
  });
});

function renderCalendar(){
  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth();
  const today=now.getDate();
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayNames=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  const daysInMonth=lastDay.getDate();
  // Monday=0 ... Sunday=6
  let startDow=firstDay.getDay()-1;
  if(startDow<0) startDow=6;

  const calSvg='<svg viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="12" cy="16" r="1.5" fill="#64B5F6" stroke="none"/></svg>';
  let html='<div class="cal-header"><span class="cal-header-icon">'+calSvg+'</span><span class="cal-header-title">'+monthNames[month]+' '+today+', '+year+'</span></div>';
  html+='<div class="cal-days-header">';
  dayNames.forEach(d=>{html+='<span>'+d+'</span>';});
  html+='</div>';
  html+='<div class="cal-grid">';
  // Empty cells before first day
  for(let i=0;i<startDow;i++){
    html+='<div class="cal-cell empty"></div>';
  }
  for(let d=1;d<=daysInMonth;d++){
    const isToday=d===today;
    html+='<div class="cal-cell'+(isToday?' today':'')+'">';
    html+='<span class="cal-num">'+d+'</span>';
    if(isToday) html+='<span class="cal-today-label">Today</span>';
    html+='</div>';
  }
  // Fill remaining cells
  const totalCells=startDow+daysInMonth;
  const remainder=totalCells%7;
  if(remainder>0){
    for(let i=0;i<7-remainder;i++){
      html+='<div class="cal-cell empty"></div>';
    }
  }
  html+='</div>';
  document.getElementById('calCardLive').innerHTML=html;
}
renderCalendar();

// ── Live Weather — SVG line-art icons (Pencil style) ──
const SVG_SUNNY='<svg viewBox="0 0 24 24" fill="none" stroke="#FBBF24" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>';
const SVG_PARTLY='<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="14" cy="8" r="3.5" stroke="#FBBF24"/><path d="M14 3v1.5M14 13v-1.5M8.7 5.2l1 1M18.3 5.2l-1 1M9.5 8H8M20 8h-1.5" stroke="#FBBF24"/><path d="M6 19a4 4 0 0 1-.68-7.95A5 5 0 0 1 15 12.9 3 3 0 0 1 15 19z" stroke="#94A3B8"/></svg>';
const SVG_CLOUDY='<svg viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"><path d="M6 19a4 4 0 0 1-.68-7.95A5 5 0 0 1 15 12.9 3 3 0 0 1 15 19z"/></svg>';
const SVG_RAINY='<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M6 15a4 4 0 0 1-.68-7.95A5 5 0 0 1 15 8.9 3 3 0 0 1 15 15z" stroke="#94A3B8"/><path d="M8 19v2M12 19v2M16 19v2" stroke="#64B5F6"/></svg>';
const SVG_STORM='<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M6 15a4 4 0 0 1-.68-7.95A5 5 0 0 1 15 8.9 3 3 0 0 1 15 15z" stroke="#94A3B8"/><path d="M13 15l-2 4h4l-2 4" stroke="#FBBF24"/></svg>';
const SVG_SNOW='<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M6 15a4 4 0 0 1-.68-7.95A5 5 0 0 1 15 8.9 3 3 0 0 1 15 15z" stroke="#94A3B8"/><circle cx="8" cy="19" r="0.5" fill="#fff" stroke="#fff"/><circle cx="12" cy="19" r="0.5" fill="#fff" stroke="#fff"/><circle cx="16" cy="19" r="0.5" fill="#fff" stroke="#fff"/><circle cx="10" cy="21" r="0.5" fill="#fff" stroke="#fff"/><circle cx="14" cy="21" r="0.5" fill="#fff" stroke="#fff"/></svg>';
const SVG_FOG='<svg viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"><path d="M4 14h16M4 18h12M6 10h12"/></svg>';

const SVG_PRESSURE='<svg viewBox="0 0 24 24" fill="none" stroke="#64B5F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.34 17a10 10 0 1 1 17.32 0"/><path d="M12 12l3.5-3.5"/><circle cx="12" cy="12" r="1.5" fill="#64B5F6" stroke="none"/></svg>';
const SVG_HUMIDITY='<svg viewBox="0 0 24 24" fill="none" stroke="#22D3EE" stroke-width="2" stroke-linecap="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>';
const SVG_WIND='<svg viewBox="0 0 24 24" fill="none" stroke="#FBBF24" stroke-width="2" stroke-linecap="round"><path d="M9.59 4.59A2 2 0 1 1 11 8H2M12.59 19.41A2 2 0 1 0 14 16H2M17.73 7.73A2.5 2.5 0 1 1 19.5 12H2"/></svg>';

const WMO_SVG={0:SVG_SUNNY,1:SVG_PARTLY,2:SVG_PARTLY,3:SVG_CLOUDY,45:SVG_FOG,48:SVG_FOG,51:SVG_RAINY,53:SVG_RAINY,55:SVG_RAINY,56:SVG_RAINY,57:SVG_RAINY,61:SVG_RAINY,63:SVG_RAINY,65:SVG_RAINY,67:SVG_RAINY,71:SVG_SNOW,73:SVG_SNOW,75:SVG_SNOW,77:SVG_SNOW,80:SVG_RAINY,81:SVG_RAINY,82:SVG_RAINY,95:SVG_STORM,96:SVG_STORM,99:SVG_STORM};
const WMO_TEXT={0:'Sunny',1:'Mostly Clear',2:'Partly Cloudy',3:'Overcast',45:'Foggy',48:'Foggy',51:'Drizzle',53:'Drizzle',55:'Drizzle',56:'Drizzle',57:'Drizzle',61:'Rainy',63:'Rainy',65:'Rainy',67:'Rainy',71:'Snowy',73:'Snowy',75:'Snowy',77:'Snowy',80:'Showers',81:'Showers',82:'Showers',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'};

function getWmoSvg(code){return WMO_SVG[code]||SVG_CLOUDY;}
function getWmoText(code){return WMO_TEXT[code]||'Unknown';}

async function fetchWeather(){
  try{
    const url='https://api.open-meteo.com/v1/forecast?latitude=48.15&longitude=17.11&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,surface_pressure&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Europe/Bratislava';
    const res=await fetch(url);
    const data=await res.json();
    renderWeather(data);
  }catch(e){
    document.getElementById('wthrCardLive').innerHTML='<div style="text-align:center;padding:40px 0;color:#ff6b6b;font-size:14px;">Weather unavailable</div>';
  }
}

function renderWeather(data){
  const cur=data.current;
  const hourly=data.hourly;
  const daily=data.daily;
  const now=new Date();
  const curSvg=getWmoSvg(cur.weather_code);
  const curTemp=Math.round(cur.temperature_2m);

  let html='';
  // Current weather — "Today [icon] 12°C"
  html+='<div class="wthr-current">';
  html+='<span class="wthr-current-label">Today</span>';
  html+='<span class="wthr-current-icon">'+curSvg+'</span>';
  html+='<span class="wthr-current-temp">'+curTemp+'°C</span>';
  html+='</div>';

  // Stats bar — pressure, humidity, wind (horizontal cards, icon left)
  html+='<div class="wthr-stats">';
  html+='<div class="wthr-stat"><span class="wthr-stat-icon">'+SVG_PRESSURE+'</span><div class="wthr-stat-text"><span class="wthr-stat-label">Air Pressure</span><span class="wthr-stat-val">'+Math.round(cur.surface_pressure)+' hPa</span></div></div>';
  html+='<div class="wthr-stat"><span class="wthr-stat-icon">'+SVG_HUMIDITY+'</span><div class="wthr-stat-text"><span class="wthr-stat-label">Humidity</span><span class="wthr-stat-val">'+Math.round(cur.relative_humidity_2m)+'%</span></div></div>';
  html+='<div class="wthr-stat"><span class="wthr-stat-icon">'+SVG_WIND+'</span><div class="wthr-stat-text"><span class="wthr-stat-label">Wind Speed</span><span class="wthr-stat-val">'+Math.round(cur.wind_speed_10m)+' km/h</span></div></div>';
  html+='</div>';

  // Hourly forecast — 6 hours
  const currentHourIndex=hourly.time.findIndex(t=>{
    const h=new Date(t);
    return h.getHours()===now.getHours()&&h.getDate()===now.getDate();
  });
  html+='<div class="wthr-hourly">';
  for(let i=0;i<6;i++){
    const idx=currentHourIndex+i;
    if(idx>=hourly.time.length) break;
    const hTime=new Date(hourly.time[idx]);
    const hr=hTime.getHours();
    const hh=hr===0?'12AM':hr<12?hr+'AM':hr===12?'12PM':(hr-12)+'PM';
    const hSvg=getWmoSvg(hourly.weather_code[idx]);
    const hTemp=Math.round(hourly.temperature_2m[idx]);
    html+='<div class="wthr-hour">';
    html+='<span class="wthr-hour-time">'+hh+'</span>';
    html+='<span class="wthr-hour-icon">'+hSvg+'</span>';
    html+='<span class="wthr-hour-temp">'+hTemp+'°</span>';
    html+='</div>';
  }
  html+='</div>';

  // Divider
  html+='<div class="wthr-divider"></div>';

  // 5-Day forecast — vertical cards
  const dayNamesShort=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  html+='<div class="wthr-daily">';
  html+='<div class="wthr-daily-title">5-Day Forecast</div>';
  html+='<div class="wthr-daily-cards">';
  for(let i=0;i<5&&i<daily.time.length;i++){
    const d=new Date(daily.time[i]);
    const dayName=dayNamesShort[d.getDay()];
    const dSvg=getWmoSvg(daily.weather_code[i]);
    const dText=getWmoText(daily.weather_code[i]);
    const hi=Math.round(daily.temperature_2m_max[i]);
    const lo=Math.round(daily.temperature_2m_min[i]);
    html+='<div class="wthr-day-card">';
    html+='<span class="wthr-day-name">'+dayName+'</span>';
    html+='<span class="wthr-day-icon">'+dSvg+'</span>';
    html+='<span class="wthr-day-desc">'+dText+'</span>';
    html+='<span class="wthr-day-temps">'+lo+'–'+hi+'°C</span>';
    html+='</div>';
  }
  html+='</div>';
  html+='</div>';

  document.getElementById('wthrCardLive').innerHTML=html;

  // Update weather pill with real temperature
  const tempEl=document.getElementById('liveTemp');
  if(tempEl) tempEl.textContent=curTemp+' °C';
}

fetchWeather();
</script>
